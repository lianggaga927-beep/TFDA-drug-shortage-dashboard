name: FDA Data Fetch & Update

on:
  schedule:
    # 台灣時間每週五凌晨 02:00 (UTC 時間週四 18:00)
    - cron: '0 18 * * 4'
  workflow_dispatch: # 允許手動觸發測試

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許寫入 Repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Execute Data Fetch Script
        # 將執行專案目錄下的 python 腳本
        run: python scripts/fetch_fda_data.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          # 若資料無變動則跳過 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update FDA drug supply data" && git push)
